<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإدارة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

</style>

</head>

<body>

<div class="container">

<h1>لوحة إدارة متجر الفردوس</h1>

<input type="text" id="title" placeholder="اسم المنتج">

<input type="text" id="price" placeholder="السعر">

<textarea id="description"
placeholder="وصف المنتج"></textarea>

<input type="text" id="image"
placeholder="رابط صورة المنتج">

<button onclick="addProduct()">
إضافة المنتج
</button>

</div>

<script>

const supabaseUrl =
'https://qpvwcgaomjdffzmipaqb.supabase.co';

const supabaseKey =
'sb_publishable_s_koPOOKAbXMefOrkVUf6g_UBvaNrI2';

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function addProduct(){

const title =
document.getElementById('title').value;

const price =
document.getElementById('price').value;

const description =
document.getElementById('description').value;

const image =
document.getElementById('image').value;

if(!title || !price || !description || !image){

alert('املأ جميع الحقول');

return;

}

const { error } = await supabase
.from('products')
.insert([{
title:title,
price:price,
description:description,
image_path:image
}]);

if(error){

alert('حدث خطأ');

console.log(error);

return;

}

alert('تمت إضافة المنتج');

document.getElementById('title').value='';
document.getElementById('price').value='';
document.getElementById('description').value='';
document.getElementById('image').value='';

}

</script>

</body>

  </html>
